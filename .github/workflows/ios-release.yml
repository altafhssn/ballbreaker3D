name: iOS Release

# Triggers:
#   - push a tag like v1.0.2  → release build → TestFlight
#   - manual "Run workflow" button on the Actions tab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      # NOTE: Godot's release URLs use "-stable" but its templates directory
      # uses ".stable" — different separators. Keep both env vars.
      GODOT_VERSION: 4.6.2-stable           # for download URLs
      GODOT_TEMPLATES_VERSION: 4.6.2.stable  # for ~/Library/.../Godot/export_templates/<this>/
      PROJECT_PATH: SmashBreaker
      IOS_BUILD_DIR: builds/ios
      BUNDLE_ID: studio.strawhat.smashbreaker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -e
          mkdir -p "$HOME/godot"
          cd "$HOME/godot"
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot.zip
          echo "GODOT_BIN=$HOME/godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"
          "$HOME/godot/Godot.app/Contents/MacOS/Godot" --version || true

      - name: Install iOS export template
        run: |
          set -e
          DEST="$HOME/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATES_VERSION}"
          mkdir -p "$DEST"
          cd "$HOME"
          curl -fsSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          echo "=== templates.tpz first 30 entries: ==="
          unzip -l templates.tpz | head -35
          # Extract everything, then find ios.zip wherever it lives.
          mkdir -p tpz_extracted
          unzip -oq templates.tpz -d tpz_extracted
          echo "=== extracted file tree: ==="
          find tpz_extracted -maxdepth 3 -type f | head -20
          IOS_ZIP=$(find tpz_extracted -name "ios.zip" | head -1)
          VERSION_TXT=$(find tpz_extracted -name "version.txt" | head -1)
          if [ -z "$IOS_ZIP" ]; then
            echo "::error::ios.zip not found anywhere in templates.tpz"
            exit 1
          fi
          cp "$IOS_ZIP" "$DEST/ios.zip"
          [ -n "$VERSION_TXT" ] && cp "$VERSION_TXT" "$DEST/version.txt"
          rm -rf tpz_extracted templates.tpz
          echo "=== Final $DEST: ==="
          ls -la "$DEST"
          if [ ! -f "$DEST/ios.zip" ]; then
            echo "::error::ios.zip not installed at $DEST/ios.zip"
            exit 1
          fi
          echo "✓ iOS export template installed ($(du -h "$DEST/ios.zip" | cut -f1))"

      - name: Set Apple Team ID in export preset
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/application\\/app_store_team_id=\".*\"/application\\/app_store_team_id=\"${TEAM_ID}\"/" \
            "${PROJECT_PATH}/export_presets.cfg"
          grep app_store_team_id "${PROJECT_PATH}/export_presets.cfg"

      - name: Headless import
        run: |
          cd "${PROJECT_PATH}"
          "$GODOT_BIN" --headless --import || true

      - name: Export Xcode project
        run: |
          set -e
          cd "${PROJECT_PATH}"
          mkdir -p "../${IOS_BUILD_DIR}"
          # Godot iOS export with project_only=true produces the Xcode project
          # (and its frameworks) alongside the .ipa path we name. Godot may
          # exit with non-zero on warnings; we run it then verify the .xcodeproj
          # actually showed up rather than trusting the exit code.
          "$GODOT_BIN" --headless --export-release "iOS" "../${IOS_BUILD_DIR}/SmashBreaker.ipa" || true
          echo "=== Contents of ${IOS_BUILD_DIR}: ==="
          ls -la "../${IOS_BUILD_DIR}"
          if [ ! -d "../${IOS_BUILD_DIR}/SmashBreaker.xcodeproj" ]; then
            echo "::error::Godot export did not produce SmashBreaker.xcodeproj"
            exit 1
          fi
          echo "✓ Xcode project produced"

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install fastlane
        run: gem install fastlane -N --no-document

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          ls -la "$HOME/.appstoreconnect/private_keys"

      - name: Build, sign and upload to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_FILEPATH: /Users/runner/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
          # Absolute paths so they resolve regardless of fastlane's CWD.
          XCODE_PROJECT: ${{ github.workspace }}/builds/ios/SmashBreaker.xcodeproj
          IPA_OUTPUT_DIR: ${{ github.workspace }}/builds/ios
        working-directory: ${{ env.PROJECT_PATH }}
        run: fastlane ios beta

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: |
            ${{ env.PROJECT_PATH }}/fastlane/report.xml
            ${{ env.PROJECT_PATH }}/fastlane/*.log
          if-no-files-found: ignore
